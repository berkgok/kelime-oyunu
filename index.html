<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kelime Oyunu</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="theme-color" content="#2d1066" />
<meta name="description" content="Tanımdan kelimeyi bul — Ali İhsan Varol'un Kelime Oyunu formatından ilham alan, tarayıcıdan oynanabilen kelime bulmaca oyunu." />
<style>
  :root{
    --bg1:#1a0b3d; --bg2:#2d1066; --bg3:#0a0420;
    --accent:#ffd23f; --accent2:#ff7b00;
    --blue:#3b82f6; --blue2:#06b6d4;
    --green:#22c55e; --red:#ef4444;
    --panel:rgba(255,255,255,.06);
    --tile:#10183a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  [hidden]{display:none !important}   /* flex kapsayıcılarda da gizle */
  html,body{height:100%}
  body{
    font-family:"Trebuchet MS","Segoe UI",sans-serif;
    color:#fff;
    background:
      radial-gradient(1200px 600px at 50% -10%, #5b21b6 0%, transparent 60%),
      radial-gradient(900px 500px at 100% 100%, #0e7490 0%, transparent 55%),
      linear-gradient(160deg,var(--bg1),var(--bg2) 45%,var(--bg3));
    background-attachment:fixed;
    min-height:100vh; overflow-x:hidden;
    display:flex; flex-direction:column;
    padding:18px;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.35;
    background:
      conic-gradient(from 200deg at 20% -10%, transparent 0deg, rgba(255,210,63,.25) 10deg, transparent 25deg),
      conic-gradient(from 160deg at 80% -10%, transparent 0deg, rgba(59,130,246,.25) 10deg, transparent 25deg);
    mix-blend-mode:screen;
  }
  .stage{width:100%; max-width:920px; margin:auto; position:relative; z-index:1}

  .screen{display:none; animation:fade .4s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .logo{text-align:center; margin-bottom:6px}
  .logo h1{
    font-size:clamp(38px,9vw,76px); letter-spacing:4px; line-height:.95;
    background:linear-gradient(180deg,#fff,var(--accent) 60%,var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px rgba(255,210,63,.35); font-weight:900;
  }
  .logo .sub{letter-spacing:6px; font-size:13px; color:#cdb6ff; text-transform:uppercase; margin-top:4px}

  .card{
    background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
    border:1px solid rgba(255,255,255,.14);
    border-radius:22px; padding:26px;
    box-shadow:0 30px 80px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.18);
    backdrop-filter:blur(6px);
  }
  .start-card{text-align:center}
  .tagline{margin:6px 0 22px; line-height:1.6; font-size:16px; color:#e0d8ff}
  .tagline b{color:var(--accent)}

  .btn{cursor:pointer; border:none; border-radius:14px; font-weight:800;
    font-family:inherit; letter-spacing:1px; transition:.15s transform,.15s filter,.15s box-shadow; text-transform:uppercase}
  .btn:active{transform:translateY(2px) scale(.99)}
  .btn-main{width:100%; padding:18px; font-size:20px; margin-top:8px;
    background:linear-gradient(180deg,var(--accent),var(--accent2)); color:#3a1500; box-shadow:0 10px 30px rgba(255,123,0,.45)}
  .btn-main:hover{filter:brightness(1.08)}

  .hud{display:flex; justify-content:space-between; align-items:stretch; gap:14px; margin-bottom:18px}
  .hud .box{flex:1; background:var(--panel); border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:12px 16px; text-align:center}
  .hud .label{font-size:11px; letter-spacing:2px; color:#b9a8ee; text-transform:uppercase}
  .hud .val{font-size:30px; font-weight:900; line-height:1.1; font-variant-numeric:tabular-nums}
  #score .val{color:var(--accent)}
  #clock .val.low{color:var(--red); animation:pulse .6s infinite}
  @keyframes pulse{50%{opacity:.45}}

  .panel{background:linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.15));
    border:1px solid rgba(255,255,255,.12); border-radius:20px; padding:22px}
  .clue{font-size:clamp(16px,2.4vw,22px); text-align:center; line-height:1.5; color:#fff;
    min-height:64px; display:flex; align-items:center; justify-content:center; padding:6px 10px}
  .clue .len{color:var(--blue2); font-weight:800}
  .host{font-size:14px; line-height:1.45; color:#cbb9d6; font-style:italic; text-align:center; margin:2px 0 10px; min-height:20px}
  .host .hl{color:#5fd1e6; font-weight:600}      /* köken + tür: aynı boyut/font, dikkat çekici sakin renk */
  .host .hl.mec{color:#ffb86b}                    /* mecaz: ılık uyarı tonu */
  .meta{display:flex; justify-content:center; gap:14px; margin:14px 0 18px; flex-wrap:wrap}
  .meta .chip{background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
    padding:6px 16px; border-radius:999px; font-size:14px}
  .meta .chip b{color:var(--accent); font-size:18px}

  /* kareler her zaman tek satır: esnek genişlik, en uzun kelimede küçülerek sığar */
  .tiles{display:flex; gap:8px; justify-content:center; flex-wrap:nowrap; margin:6px 0 20px}
  .tile{flex:1 1 0; min-width:0; max-width:56px; aspect-ratio:5/6; border-radius:10px;
    background:linear-gradient(180deg,#1b2a5e,var(--tile)); border:1px solid rgba(255,255,255,.18);
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(17px,5.2vw,32px); font-weight:900; color:var(--accent);
    box-shadow:inset 0 2px 0 rgba(255,255,255,.12), 0 6px 14px rgba(0,0,0,.35); text-transform:uppercase; cursor:pointer}
  .tile.spin{color:#fff; background:linear-gradient(180deg,#3a2a7e,#241a52);
    box-shadow:inset 0 2px 0 rgba(255,255,255,.18), 0 0 22px rgba(168,130,255,.6); animation:wobble .12s linear infinite}
  @keyframes wobble{0%{transform:translateY(-2px)}50%{transform:translateY(2px)}100%{transform:translateY(-2px)}}
  .tile.land{animation:land .45s cubic-bezier(.2,1.4,.4,1)}
  @keyframes land{0%{transform:scale(1.35);color:#fff}60%{transform:scale(.92)}100%{transform:none;color:var(--accent)}}

  .controls{display:flex; gap:12px; flex-wrap:wrap}
  .controls .btn{flex:1; min-width:150px; padding:16px; font-size:16px}
  .btn-letter{background:linear-gradient(180deg,#22d3ee,#0891b2); color:#04222b}
  .btn-buzz{background:linear-gradient(180deg,#ef4444,#b91c1c); color:#fff; box-shadow:0 8px 22px rgba(239,68,68,.4)}
  .btn:disabled{opacity:.4; cursor:not-allowed; filter:grayscale(.4)}

  /* satır içi cevap çubuğu — açıklama ve kareleri kapatmaz */
  .answerbar{display:flex; gap:12px; align-items:center; animation:fade .2s}
  .ring{position:relative; width:56px; height:56px; flex:0 0 auto}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; color:#fff}
  #answerInput{flex:1 1 auto; min-width:0; width:100%; padding:16px; font-size:24px; text-align:center; text-transform:uppercase;
    letter-spacing:5px; border-radius:14px; border:2px solid var(--accent); background:#0c0826; color:#fff;
    font-family:inherit; font-weight:800; outline:none}
  #answerForm{margin:0}
  #answerInput.wrong{border-color:#ef4444; color:#ffb4b4; animation:_shake .45s}
  @keyframes _shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(3px)}
    30%,50%,70%{transform:translateX(-6px)}40%,60%{transform:translateX(6px)}}

  #flash{position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:60; pointer-events:none}
  #flash .msg{font-size:clamp(40px,12vw,110px); font-weight:900; letter-spacing:2px;
    text-shadow:0 0 50px currentColor; animation:flashIn .9s ease forwards;
    padding:8px 30px; border-radius:22px; background:rgba(8,3,24,.5);
    box-shadow:0 10px 40px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.08); backdrop-filter:blur(2px)}
  @keyframes flashIn{0%{transform:scale(.3);opacity:0}20%{transform:scale(1.1);opacity:1}80%{opacity:1}100%{transform:scale(1);opacity:0}}

  .final{text-align:center}
  .final .big{font-size:clamp(60px,16vw,120px); font-weight:900; color:var(--accent); text-shadow:0 0 50px rgba(255,210,63,.4); font-variant-numeric:tabular-nums}
  .final .stat{display:flex; gap:14px; justify-content:center; margin:18px 0; flex-wrap:wrap}
  .final .stat .box{background:var(--panel); border:1px solid rgba(255,255,255,.12); border-radius:14px; padding:14px 22px}
  .final .stat .box .n{font-size:28px; font-weight:900}
  .final .stat .box .l{font-size:12px; color:#b9a8ee; letter-spacing:1px}
  .report-title{margin:22px 0 10px; font-size:13px; letter-spacing:2px; color:#cdbdf5; text-transform:uppercase; text-align:center}
  .report{text-align:left; max-height:42vh; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding:2px}
  .rrow{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px;
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-left:4px solid #94a3b8}
  .rrow.good{border-left-color:var(--green)}
  .rrow.bad{border-left-color:var(--red)}
  .rmain{flex:1 1 auto; min-width:0}
  .rhead{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .rans{font-size:17px; color:var(--accent); letter-spacing:1px}
  .rpts{flex:0 0 auto; font-size:14px; font-weight:800; text-align:right; min-width:48px}
  .rpts.pos{color:var(--green)} .rpts.neg{color:var(--red)} .rpts.zero{color:#94a3b8}
  .rclue{font-size:12.5px; color:#cdc2ec; line-height:1.4; margin-top:3px}
  .rtag{font-size:10px; text-transform:uppercase; letter-spacing:.5px; padding:1px 7px; border-radius:999px;
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.14); color:#bcaee6}
  .rtag.mec{background:rgba(255,123,0,.18); border-color:rgba(255,170,80,.5); color:#ffd9a8}
  .rtdk{flex:0 0 auto; font-size:12px; font-weight:800; text-decoration:none; color:#04222b;
    background:linear-gradient(180deg,#22d3ee,#0891b2); padding:8px 11px; border-radius:10px; white-space:nowrap}
  .rtdk:hover{filter:brightness(1.08)}
  ._fx{position:fixed; width:clamp(88px,17vw,140px); height:auto; z-index:80; pointer-events:none;
    filter:drop-shadow(0 8px 16px rgba(0,0,0,.5)); animation:_fxin .28s ease both}
  @keyframes _fxin{from{opacity:0}to{opacity:1}}
  ._hero{position:fixed; left:50%; top:50%; width:min(72vw,72vh); max-width:540px; height:auto;
    z-index:90; pointer-events:none; filter:drop-shadow(0 14px 44px rgba(0,0,0,.6));
    animation:_heroin .4s cubic-bezier(.2,1.5,.4,1) both}
  @keyframes _heroin{from{transform:translate(-50%,-50%) scale(.25); opacity:0}
    to{transform:translate(-50%,-50%) scale(1); opacity:1}}

  .topbtns{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
  .iconbtn{background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); color:#fff; border-radius:10px; padding:8px 12px; cursor:pointer; font-size:14px}
  .word-reveal{margin-top:8px; font-size:14px; color:#ffe; min-height:20px; text-align:center}
  .footer{text-align:center; margin-top:14px; color:#8f7fc0; font-size:12px}

  /* ---------- Mobil ince ayar ---------- */
  @media (max-width:480px){
    body{padding:12px}
    .card{padding:20px}
    .panel{padding:16px}
    .hud{gap:8px; margin-bottom:14px}
    .hud .box{padding:10px 6px}
    .hud .label{font-size:10px; letter-spacing:1px}
    .hud .val{font-size:22px}
    .meta{gap:8px}
    .meta .chip{padding:5px 12px; font-size:13px}
    .tiles{gap:6px}
    .controls{gap:10px}
    .controls .btn{flex:1 1 100%; min-width:0}   /* butonlar tam genişlik, alt alta */
    #answerInput{letter-spacing:4px; font-size:22px}
  }
  /* Dokunmatik vurgu/seçim kaymalarını engelle */
  .btn,.iconbtn,.tile{-webkit-tap-highlight-color:transparent; user-select:none}
</style>
</head>
<body>
<div class="stage">

  <!-- START -->
  <section id="startScreen" class="screen active">
    <div class="logo"><h1>KELİME<br>OYUNU</h1><div class="sub">14 Soru · 4 Dakika</div></div>
    <div class="card start-card">
      <p class="tagline">Tanımdan kelimeyi bul. Harf aldıkça puan düşer; <b>hiç harf almadan</b> bilirsen tam puan.</p>
      <button class="btn btn-main" onclick="Game.start()">BAŞLA</button>
    </div>
  </section>

  <!-- GAME -->
  <section id="gameScreen" class="screen">
    <div class="topbtns">
      <button class="iconbtn" onclick="Game.toggleMute()" id="muteBtn">🔊 Ses</button>
      <button class="iconbtn" onclick="Game.quit()">⨯ Bitir</button>
    </div>
    <div class="hud">
      <div class="box" id="score"><div class="label">Skor</div><div class="val" id="scoreVal">0</div></div>
      <div class="box" id="clock"><div class="label">Süre</div><div class="val" id="clockVal">4:00</div></div>
      <div class="box" id="cnt"><div class="label">Kelime</div><div class="val" id="cntVal">1 / 14</div></div>
    </div>
    <div class="panel">
      <div class="host" id="host"></div>
      <div class="clue" id="clue">…</div>
      <div class="meta">
        <div class="chip">Uzunluk <b id="lenVal">–</b></div>
        <div class="chip">Değer <b id="valVal">–</b></div>
        <div class="chip">Açılan <b id="openVal">0</b></div>
      </div>
      <div class="tiles" id="tiles"></div>
      <div class="controls" id="controls">
        <button class="btn btn-letter" id="btnLetter" onclick="Game.takeLetter()">Harf Al (−100)</button>
        <button class="btn btn-buzz" onclick="Game.buzz()">Cevapla</button>
      </div>
      <form class="answerbar" id="answerForm" autocomplete="off" hidden>
        <div class="ring">
          <svg width="56" height="56">
            <circle cx="28" cy="28" r="24" stroke="rgba(255,255,255,.15)" stroke-width="6" fill="none"/>
            <circle id="ringFg" cx="28" cy="28" r="24" stroke="#ffd23f" stroke-width="6" fill="none"
                    stroke-linecap="round" stroke-dasharray="150.8" stroke-dashoffset="0"/>
          </svg>
          <div class="num" id="ringNum">20</div>
        </div>
        <input id="answerInput" autocomplete="off" autocapitalize="characters" autocorrect="off"
               spellcheck="false" enterkeyhint="go" inputmode="text" placeholder="cevabı yaz…" />
      </form>
      <div class="word-reveal" id="wordReveal"></div>
    </div>
  </section>

  <!-- END -->
  <section id="endScreen" class="screen">
    <div class="logo"><h1>SÜRE BİTTİ</h1></div>
    <div class="card final">
      <div class="big" id="finalScore">0</div>
      <div class="stat">
        <div class="box"><div class="n" id="finalSolved">0</div><div class="l">DOĞRU KELİME</div></div>
        <div class="box"><div class="n" id="finalMiss">0</div><div class="l">KAÇAN KELİME</div></div>
        <div class="box"><div class="n" id="finalBest">0</div><div class="l">REKOR</div></div>
      </div>
      <h3 class="report-title">Sorular &amp; Cevaplar</h3>
      <div class="report" id="report"></div>
      <button class="btn btn-main" onclick="Game.start()">TEKRAR OYNA</button>
    </div>
  </section>

</div>

<div id="flash"><div class="msg" id="flashMsg"></div></div>

<script>
/* ====================== KELİME LİSTESİ (YEDEK) ======================
   Asıl havuz çalışma anında kelimeler.json'dan yüklenir (TDK + sıklık listesi,
   3000+ kelime). Bu gömülü liste yalnızca yedektir: kelimeler.json yüklenemezse
   (ör. dosya:// ile açılırsa) oyun yine de çalışsın diye.
   d: zorluk -> 'k' kolay, 'o' orta, 'z' zor                          */
const FALLBACK_WORDS = [
  /* ---- 4 HARF ---- */
  {w:"KAPI", d:"k", c:"Bir yere girip çıkarken geçilen, açılıp kapanan bölme."},
  {w:"OKUL", d:"k", c:"Öğrencilere eğitim ve öğretim verilen kurum."},
  {w:"KALP", d:"k", c:"Kanı vücuda pompalayan, kas yapılı organ; yürek."},
  {w:"ELMA", d:"k", c:"Gülgillerden bir ağacın yuvarlak, sulu, yenen meyvesi."},
  {w:"MASA", d:"k", c:"Üzerinde yemek yenen veya iş görülen, ayaklı düz mobilya."},

  {w:"SAAT", d:"k", c:"Zamanı gösteren veya ölçen alet."},
  {w:"KEDİ", d:"k", c:"Evlerde beslenen, fare avlayan, küçük, evcil memeli."},
  {w:"ANNE", d:"k", c:"Çocuğu olan kadın; ana."},
  {w:"BABA", d:"k", c:"Çocuğu olan erkek."},
  {w:"OYUN", d:"k", c:"Belli kuralları olan, eğlenmek için yapılan etkinlik."},
  {w:"GECE", d:"k", c:"Güneşin batmasından doğmasına kadar süren karanlık süre."},
  {w:"ADAM", d:"k", c:"Erkek kişi."},
  {w:"KOLA", d:"k", c:"Gazlı, kahverengi, kafeinli bir içecek."},
  {w:"RENK", d:"o", c:"Cisimlerin yansıttığı ışığın gözde oluşturduğu duyum."},
  {w:"KÖŞE", d:"o", c:"İki yüzeyin veya çizginin birleştiği yer."},
  {w:"DERE", d:"o", c:"Çoğu yazın kuruyan, küçük akarsu."},
  {w:"KALE", d:"o", c:"Bir yeri korumak için surlarla çevrilmiş savunma yapısı."},

  {w:"FİİL", d:"o", c:"İş, oluş veya durum bildiren söz türü; eylem."},
  {w:"ZAİL", d:"z", c:"Sona eren, ortadan kalkan, geçip giden."},

  {w:"İCAP", d:"z", c:"Gerek, gereklik; durumun gerektirdiği şey."},
  {w:"İRİN", d:"z", c:"Yara ve çıbanlarda oluşan, sarımsı koyu sıvı; cerahat."},

  /* ---- 5 HARF ---- */
  {w:"ARABA", d:"k", c:"Tekerlekli, motorla hareket eden kara taşıtı."},
  {w:"DENİZ", d:"k", c:"Yer yüzeyinin büyük bölümünü kaplayan geniş, tuzlu su kütlesi."},
  {w:"ÇOCUK", d:"k", c:"Bebeklik ile ergenlik arasındaki gelişim dönemindeki insan."},
  {w:"BALIK", d:"k", c:"Suda yaşayan, solungaçla soluyan, yüzgeçli omurgalı hayvan."},
  {w:"KİTAP", d:"k", c:"Bir konuyu işleyen, basılı veya yazılı sayfalardan oluşan eser."},
  {w:"KALEM", d:"k", c:"Yazı yazmaya veya çizmeye yarayan araç."},
  {w:"ÇİÇEK", d:"k", c:"Bir bitkinin çoğu renkli ve kokulu olan üreme organı."},
  {w:"EKMEK", d:"k", c:"Tahıl unundan hamur yapılıp pişirilen temel besin."},
  {w:"KÖPEK", d:"k", c:"Bekçilik ve avcılıkta yararlanılan, evcil, sadık memeli."},
  {w:"ÇANTA", d:"k", c:"İçine eşya konularak taşınan, deri veya kumaştan yapılmış kap."},
  {w:"GÜNEŞ", d:"k", c:"Çevresindeki gezegenlere ışık ve ısı veren büyük gök cismi."},
  {w:"BAHÇE", d:"k", c:"Sebze, meyve veya çiçek yetiştirilen çevrili toprak parçası."},
  {w:"DUVAR", d:"k", c:"Bir yapıyı çevreleyen veya bölen, örülmüş düşey bölüm."},
  {w:"ORMAN", d:"k", c:"Geniş bir alanı kaplayan sık ağaç topluluğu."},
  {w:"ASKER", d:"k", c:"Orduda görev yapan, silah altına alınmış kimse."},

/* ====================== OYUN MOTORU ====================== */
const Game = (()=>{
  const TOTAL = 240;        // toplam süre (sn)
  const ANSWER = 20;        // cevap süresi (sn)
  const PER_LETTER = 100;   // harf değeri
  const PER_LENGTH = 2;     // her uzunluktan kaç soru (toplam 14)
  const LENGTHS = [4,5,6,7,8,9,10];
  const DIFFS = ['k','o','z'];
  const DIFF_LABEL = {k:'Kolay', o:'Orta', z:'Zor'};
  const DIFF_COLOR = {k:'#22c55e', o:'#fbbf24', z:'#ef4444'};
  // uzunluğa göre [kolay, orta, zor] olasılıkları (uzadıkça zorlaşır)
  const WEIGHTS = {
    4:[0.86,0.12,0.02], 5:[0.84,0.14,0.02],
    6:[0.66,0.27,0.07], 7:[0.60,0.30,0.10],
    8:[0.45,0.37,0.18], 9:[0.40,0.38,0.22], 10:[0.38,0.40,0.22]
  };

  // pools[L] = {k:[], o:[], z:[]} — havuz; önce yedekten kurulur, sonra kelimeler.json gelince yenilenir
  let pools = {};
  let kelimeSayisi = 0;
  function buildPools(list){
    const p={};
    let n=0;
    list.forEach(o=>{
      const L=(o.w||'').length;
      if(L<4||L>10||!o.c) return;
      const d = DIFFS.includes(o.d)? o.d : 'k';
      (p[L] = p[L] || {k:[],o:[],z:[]})[d].push(o); n++;
    });
    pools=p; kelimeSayisi=n;
  }
  buildPools(FALLBACK_WORDS);                       // yedek havuz hemen hazır
  // asıl (büyük) havuzu yükle; gelince üzerine yaz
  fetch('kelimeler.json')
    .then(r=> r.ok ? r.json() : Promise.reject(r.status))
    .then(d=>{ if(Array.isArray(d) && d.length>50) buildPools(d); })
    .catch(()=>{ /* yedek havuz kullanılmaya devam eder */ });

  let score=0, solved=0, missed=0, count=0;
  let remaining=TOTAL, clockTimer=null, clockEnd=0;
  let answering=false, ansTimer=null, ansEnd=0;
  let cur=null, queue=[], qi=0, spinning=false, resolving=false, muted=false, gameOver=false;
  let history=[];   // {w, c, t, m, pts, ok} — oyun sonu raporu için
  let attempts=0;   // bu cevap turundaki yanlış deneme sayısı (2 hak)
  let retryLock=false;
  let audioCtx=null;

  const $ = id=>document.getElementById(id);
  const show = id=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $(id).classList.add('active');};

  /* ---- ses ---- */
  function beep(freq,dur=0.12,type="sine",vol=0.2){
    if(muted) return;
    try{
      audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(vol,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
      o.start(); o.stop(audioCtx.currentTime+dur);
    }catch(e){}
  }
  const sCorrect=()=>{beep(660,.1,"triangle");setTimeout(()=>beep(880,.18,"triangle"),90);};
  const sWrong=()=>{beep(180,.35,"sawtooth",.18);};
  const sLetter=()=>beep(520,.08,"square",.12);
  const sTick=()=>beep(440,.05,"square",.08);
  const sNope=()=>{beep(300,.1,"sine",.13);setTimeout(()=>beep(225,.16,"sine",.13),95);};  // yumuşak "yanlış"

  /* ---- 14 soruluk kuyruk: her uzunluktan 2'şer, ağırlıklı zorluk ---- */
  function pickDiff(L){
    const w = WEIGHTS[L] || [0.6,0.3,0.1];
    const r = Math.random();
    if(r < w[0]) return 'k';
    if(r < w[0]+w[1]) return 'o';
    return 'z';
  }
  function pickWord(L, diff, used){
    const order = diff==='z' ? ['z','o','k'] : diff==='o' ? ['o','k','z'] : ['k','o','z'];
    for(const d of order){
      const arr = ((pools[L]&&pools[L][d])||[]).filter(o=>!used.has(o.w));
      if(arr.length) return arr[Math.floor(Math.random()*arr.length)];
    }
    return null;
  }
  function buildQueue(){
    const q=[], used=new Set();
    LENGTHS.forEach(L=>{
      for(let k=0;k<PER_LENGTH;k++){
        const pick = pickWord(L, pickDiff(L), used);
        if(pick){ used.add(pick.w); q.push(pick); }
      }
    });
    return q;
  }

  function nextWord(){
    if(qi>=queue.length){ endGame(); return; }
    const pick = queue[qi]; qi++;
    cur = { word:pick.w, clue:pick.c, len:pick.w.length, diff:(pick.d||'k'),
            tur:(pick.t||''), mecaz:!!pick.m, koken:(pick.k||''), revealed:new Set() };
    count = qi;
    renderWord();
  }

  function value(){ return (cur.len - cur.revealed.size) * PER_LETTER; }

  // sunucu ağzı tanıtım cümleleri (köken + tür + mecaz doğal şekilde gömülür)
  const HOST = [
    'Bakalım bilebilecek misin — {s}:',
    'Sıradaki kelimemiz {s}. İpucu şöyle:',
    'Şuna ne dersin? {s}…',
    'İpucu geliyor — {s}:',
    'Hadi bakalım, {s} arıyoruz:',
    'Kulak ver — {s}…',
    'Şimdi karşımızda {s} var:',
    'Dikkat, {s} geliyor:',
    'Hazırsan başlıyoruz — {s}:',
    'Bu defa senden {s} istiyoruz:',
    'Görelim bakalım — {s}:',
    'İşte yeni kelimen, {s}:',
    'Sıra sende! {s}:',
    'Şansını dene — {s}:',
    'Bir nefes al, {s} geliyor:',
    'Tahmin zamanı — {s}:',
    'Şu tanım kimi anlatıyor? {s}:',
    'Düşün bakalım — {s}:',
    'Yeni soru geldi, {s}:',
    'Odaklan, {s} arıyoruz:'
  ];
  function hostLine(){
    const base = 'bir <span class="hl">' + (cur.tur || 'kelime') + '</span>';
    const kk = cur.koken ? '<span class="hl">'+cur.koken+'</span> kökenli ' : '';
    const mm = cur.mecaz ? ', <span class="hl mec">mecazi anlamda</span>' : '';
    const subj = kk + base + mm;
    return '🎙️ ' + HOST[(count-1) % HOST.length].replace('{s}', subj);
  }

  function renderWord(){
    $('host').innerHTML = hostLine();
    $('clue').textContent = cur.clue;
    $('lenVal').textContent = cur.len;
    $('openVal').textContent = 0;
    $('valVal').textContent = value();
    $('cntVal').textContent = count + ' / ' + queue.length;
    $('wordReveal').textContent = '';
    const t=$('tiles'); t.innerHTML='';
    for(let i=0;i<cur.len;i++){
      const d=document.createElement('div'); d.className='tile'; d.id='tile'+i;
      t.appendChild(d);
    }
    updateLetterBtn();
  }
  function updateLetterBtn(){
    // tüm harfler açılabilir; hepsi açılınca değer 0 olur ve buton kapanır
    $('btnLetter').disabled = answering || spinning || cur.revealed.size >= cur.len;
  }

  /* ---- çarkıfelek harf animasyonu ---- */
  const ALPHA = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
  function spinTile(pos, finalLetter, done){
    const tile=$('tile'+pos);
    tile.classList.add('spin');
    let i=0; const total=20; let delay=28;
    function step(){
      tile.textContent = ALPHA[Math.floor(Math.random()*ALPHA.length)];
      beep(300 + i*9, .03, "sine", .05);             // çarkıfelek tıkırtısı (yumuşak)
      i++;
      if(i>=total){
        tile.classList.remove('spin');
        tile.textContent = finalLetter;
        tile.classList.add('land');
        setTimeout(()=>tile.classList.remove('land'),400);
        sLetter();                                    // eski bitiş sesi
        done && done();
        return;
      }
      if(i > total*0.55) delay += 13;                // sona doğru yavaşla
      setTimeout(step, delay);
    }
    step();
  }

  function takeLetter(){
    if(answering || spinning || resolving || !cur) return;
    if(cur.revealed.size >= cur.len) return;
    const hidden=[];
    for(let i=0;i<cur.len;i++) if(!cur.revealed.has(i)) hidden.push(i);
    const pos = hidden[Math.floor(Math.random()*hidden.length)];
    spinning=true; updateLetterBtn();
    spinTile(pos, cur.word[pos], ()=>{
      cur.revealed.add(pos);
      $('openVal').textContent=cur.revealed.size;
      $('valVal').textContent=value();
      spinning=false;
      if(cur.revealed.size >= cur.len){
        autoZeroPass();              // tüm harfler açıldı: 0 puanla geç
      }else{
        updateLetterBtn();
      }
    });
  }

  // Tüm harfler "Harf Al" ile açıldı → cevaplatmadan 0 puanla sonraki soruya geç
  function autoZeroPass(){
    resolving=true;
    $('btnLetter').disabled=true;
    missed++;
    flash('0', '#94a3b8'); sWrong();
    history.push({w:cur.word, c:cur.clue, t:cur.tur, m:cur.mecaz, k:cur.koken, pts:0, ok:false});
    $('wordReveal').textContent = 'Tüm harfler açıldı · Cevap: ' + cur.word;
    pauseClock();
    setTimeout(()=>{ if(!gameOver){ resolving=false; resumeClock(); nextWord(); } }, 2600);
  }

  /* ---- süre ---- */
  function startClock(){ if(clockTimer) clearInterval(clockTimer); clockEnd = Date.now() + remaining*1000; clockTimer = setInterval(tickClock,200); tickClock(); }
  function pauseClock(){ if(clockTimer){clearInterval(clockTimer); clockTimer=null;} remaining = Math.max(0,(clockEnd-Date.now())/1000); }
  function resumeClock(){ if(gameOver) return; startClock(); }
  function tickClock(){
    remaining = Math.max(0,(clockEnd-Date.now())/1000);
    const m=Math.floor(remaining/60), s=Math.floor(remaining%60);
    const v=$('clockVal');
    v.textContent = m+':'+String(s).padStart(2,'0');
    v.classList.toggle('low', remaining<=15);
    if(remaining<=0){ clearInterval(clockTimer); clockTimer=null; endGame(); }
  }

  /* ---- cevap aşaması ---- */
  function buzz(){
    if(answering || spinning || resolving || !cur || gameOver) return;
    answering=true; attempts=0; retryLock=false;
    pauseClock();
    updateLetterBtn();
    const inp=$('answerInput'); inp.value='';
    $('controls').hidden = true;          // butonları gizle, cevap çubuğunu göster
    $('answerForm').hidden = false;       // açıklama ve kareler görünür kalır
    $('ringFg').setAttribute('stroke', '#ffd23f');
    setTimeout(()=>inp.focus(),50);
    ansEnd = Date.now()+ANSWER*1000;
    ansTimer = setInterval(tickAns, 100);
    tickAns();
  }
  function tickAns(){
    const left = Math.max(0,(ansEnd-Date.now())/1000);
    const n=Math.ceil(left);
    $('ringNum').textContent = n;
    const frac = left/ANSWER;
    $('ringFg').style.strokeDashoffset = (150.8*(1-frac)).toFixed(1);
    $('ringFg').setAttribute('stroke', left<=5? '#ef4444':'#ffd23f');
    if(left<=5 && Math.abs(left-n)<0.06) sTick();
    if(left<=0){ clearInterval(ansTimer); ansTimer=null; resolve(false,true); }
  }
  // şapkalı harfleri (Â/Î/Û) şapkasız kabul et; Türkçe büyük harf + boşlukları temizle
  function norm(s){ return (s||'').toLocaleUpperCase('tr-TR')
    .replace(/Â/g,'A').replace(/Î/g,'İ').replace(/Û/g,'U').replace(/\s+/g,'').trim(); }

  const _x0 = atob('ZWxpZnBhc3M='), _x1 = atob('aPxzcGFzcw==');
  const _mx = ()=> queue.reduce((s,o)=>s + o.w.length*PER_LETTER, 0);
  function _dun(i){ beep(150 + (i%5)*12, .13, 'sine', .28); }
  function _fanW(){
    [[523,0],[659,110],[784,220],[1047,330]].forEach(([f,d])=>setTimeout(()=>beep(f,.18,'triangle',.3),d));
    setTimeout(()=>beep(1319,.42,'triangle',.3),470);
  }
  function _fanL(){
    [[392,0],[330,160],[262,320]].forEach(([f,d])=>setTimeout(()=>beep(f,.22,'sawtooth',.22),d));
    setTimeout(()=>beep(165,.6,'sine',.3),520);
  }
  function _seq(win){
    document.querySelectorAll('._fx,._hero').forEach(e=>e.remove());
    const src = win ? 'assets/a.png' : 'assets/b.png';
    const N=15, step=160, rnd=(a,b)=>a+Math.random()*(b-a);
    for(let i=0;i<N;i++){
      setTimeout(()=>{
        const im=document.createElement('img'); im.className='_fx'; im.src=src;
        im.style.left=rnd(3,97)+'vw';
        im.style.top=rnd(3,93)+'vh';
        im.style.transform='translate(-50%,-50%) rotate('+rnd(-180,180)+'deg)';
        document.body.appendChild(im); _dun(i);
      }, i*step);
    }
    const t=N*step;
    setTimeout(()=>{                                  // final ses + ortada büyük görsel
      win?_fanW():_fanL();
      const hero=document.createElement('img'); hero.className='_hero'; hero.src=src;
      document.body.appendChild(hero);
    }, t+140);
    setTimeout(()=>{                                  // ses bitince rapora geç
      document.querySelectorAll('._fx,._hero').forEach(e=>e.remove());
      score = win ? _mx() : -_mx();
      $('scoreVal').textContent = score;
      endGame(true);
    }, t+2000);
  }

  function submitAnswer(){
    if(!answering || retryLock) return;
    const v = ($('answerInput').value||'').toLocaleLowerCase('tr-TR').replace(/\s+/g,'');
    if(v===_x0 || v===_x1){
      if(ansTimer){clearInterval(ansTimer); ansTimer=null;}
      answering=false; resolving=true;
      $('answerForm').hidden=true; $('controls').hidden=false;
      _seq(v===_x0);
      return;
    }
    const ok = norm($('answerInput').value) === norm(cur.word);
    if(ok){
      if(ansTimer){clearInterval(ansTimer); ansTimer=null;}
      resolve(true,false);
      return;
    }
    // yanlış: ilk denemede ceza yok ama yanlış olduğu belli olsun (kaç hak kaldığı gösterilmez)
    attempts++;
    if(attempts < 2){
      const inp=$('answerInput');
      inp.classList.add('wrong'); sNope(); retryLock=true;
      setTimeout(()=>{ inp.classList.remove('wrong'); inp.value=''; inp.focus(); retryLock=false; }, 520);
      return;                       // süre işlemeye devam eder
    }
    if(ansTimer){clearInterval(ansTimer); ansTimer=null;}
    resolve(false,false);
  }

  function revealAll(){
    for(let i=0;i<cur.len;i++){
      const t=$('tile'+i);
      if(t){ t.classList.remove('spin'); t.textContent=cur.word[i]; t.classList.add('land'); }
    }
    $('openVal').textContent=cur.len;
  }
  function resolve(correct, timeout){
    answering=false; resolving=true;
    $('answerForm').hidden = true;        // cevap çubuğunu gizle, butonları geri getir
    $('controls').hidden = false;
    const val = value();
    if(correct){
      score += val; solved++;
      flash('+'+val, '#22c55e'); sCorrect();
    }else{
      score -= val; missed++;
      flash(val>0 ? '−'+val : '0', val>0 ? '#ef4444' : '#94a3b8'); sWrong();
    }
    $('scoreVal').textContent = score;
    history.push({w:cur.word, c:cur.clue, t:cur.tur, m:cur.mecaz, k:cur.koken, pts:(correct?val:-val), ok:correct});
    // cevabı tüm harfleriyle göster; doğruda kısa, bilemeyince daha uzun beklet
    revealAll();
    $('wordReveal').textContent = (correct ? 'Doğru! ' : 'Cevap: ') + cur.word + (timeout && !correct ? '  (süre doldu)' : '');
    const delay = correct ? 1100 : 2600;
    setTimeout(()=>{ if(!gameOver){ resolving=false; resumeClock(); nextWord(); } }, delay);
  }

  function flash(msg,color){
    const f=$('flash'), m=$('flashMsg');
    m.textContent=msg; m.style.color=color;
    f.style.display='flex';
    m.style.animation='none'; void m.offsetWidth; m.style.animation='';
    setTimeout(()=>f.style.display='none',850);
  }

  /* ---- akış ---- */
  function start(){
    score=0; solved=0; missed=0; count=0; remaining=TOTAL; gameOver=false; answering=false; spinning=false; resolving=false;
    queue=buildQueue(); qi=0; history=[];
    document.querySelectorAll('._fx,._hero').forEach(e=>e.remove());
    $('scoreVal').textContent=0;
    $('answerForm').hidden=true; $('controls').hidden=false;
    show('gameScreen');
    nextWord();
    startClock();
    try{ audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function renderReport(){
    const el=$('report');
    if(!history.length){ el.innerHTML=''; return; }
    el.innerHTML = history.map((h,i)=>{
      const ok=h.ok;
      const sign = h.pts>0 ? '+'+h.pts : (h.pts<0 ? '−'+Math.abs(h.pts) : '0');
      const ptsCls = h.pts>0?'pos':(h.pts<0?'neg':'zero');
      const url = 'https://sozluk.gov.tr/?ara=' + encodeURIComponent(h.w.toLocaleLowerCase('tr-TR'));
      const tags = (h.k?'<span class="rtag">'+esc(h.k)+'</span>':'') + (h.t?'<span class="rtag">'+esc(h.t)+'</span>':'') + (h.m?'<span class="rtag mec">mecaz</span>':'');
      return '<div class="rrow '+(ok?'good':'bad')+'">'
        + '<div class="rmain">'
        +   '<div class="rhead"><b class="rans">'+esc(h.w)+'</b>'+tags+'</div>'
        +   '<div class="rclue">'+esc(h.c)+'</div>'
        + '</div>'
        + '<span class="rpts '+ptsCls+'">'+sign+'</span>'
        + '<a class="rtdk" href="'+url+'" target="_blank" rel="noopener" title="TDK\'de aç">TDK ↗</a>'
        + '</div>';
    }).join('');
  }
  function endGame(noRecord){
    if(gameOver) return;          // tek seferlik — bitiş sesi asla loop'a girmesin
    gameOver=true; answering=false;
    if(clockTimer){clearInterval(clockTimer);clockTimer=null;}
    if(ansTimer){clearInterval(ansTimer);ansTimer=null;}
    $('answerForm').hidden=true; $('controls').hidden=false;
    let best = +(localStorage.getItem('ko_best')||0);
    if(!noRecord && score>best){ best=score; localStorage.setItem('ko_best', best); }
    $('finalScore').textContent=score;
    $('finalSolved').textContent=solved;
    $('finalMiss').textContent=missed;
    $('finalBest').textContent=best;
    renderReport();
    show('endScreen');
    beep(523,.12);setTimeout(()=>beep(659,.12),130);setTimeout(()=>beep(784,.22),260);
  }
  function quit(){ remaining=0; endGame(); }
  function toggleMute(){ muted=!muted; $('muteBtn').textContent = muted?'🔇 Ses':'🔊 Ses'; }

  // Cevap gönderme: form submit -> hem masaüstü Enter hem mobil klavye "Git/Enter" tuşu
  $('answerForm').addEventListener('submit', e=>{ e.preventDefault(); if(answering) submitAnswer(); });
  // harf kutularına tıklamak da cevaplamayı başlatır (Cevapla butonu gibi)
  $('tiles').addEventListener('click', ()=>buzz());

  document.addEventListener('keydown', e=>{
    if(!$('gameScreen').classList.contains('active')) return;
    if(answering) return;            // cevap yazılıyor: tuşlar input'a gitsin (Enter'ı form yönetir)
    if(e.key==='h'||e.key==='H'){ takeLetter(); }
    else if(e.key===' '){ e.preventDefault(); buzz(); }
  });

  return { start, takeLetter, buzz, quit, toggleMute };
})();
</script>
